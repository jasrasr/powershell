<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Spin Wheel</title>
    <style>
        :root {
            --bg: #ececec;
            --rim: #f22a2a;
            --text: #0f0f0f;
            --btn-bg: #e1e1e1;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .page {
            max-width: 900px;
            padding: 16px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
        }

        .wheel-wrap {
            width: min(640px, 90vw);
            aspect-ratio: 1;
            position: relative;
            margin-bottom: 4px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            width: min(900px, 95vw);
        }

        input,
        button {
            border: 1px solid #dadada;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 22px;
            line-height: 1;
            background: #efefef;
            min-height: 44px;
        }

        input { width: min(320px, 42vw); }

        button {
            cursor: pointer;
            background: var(--btn-bg);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .55;
        }
    </style>
</head>
<body>
    <main class="page">
        <h1>Dynamic Spin Wheel</h1>

        <section class="wheel-wrap" aria-label="Spin wheel canvas">
            <canvas id="wheelCanvas" width="640" height="640"></canvas>
        </section>

        <section class="controls">
            <input id="minInput" type="number" value="1" aria-label="Minimum value">
            <input id="maxInput" type="number" value="4" aria-label="Maximum value">
            <button id="generateBtn" type="button">Generate Wheel</button>
            <button id="spinBtn" type="button">Spin</button>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const generateBtn = document.getElementById('generateBtn');
        const spinBtn = document.getElementById('spinBtn');

        const rimColor = '#f22a2a';
        const palette = ['#f2df44', '#6ef0c3', '#8efe47', '#ffae3b', '#9f8dff', '#56d0ff'];

        let numbers = [1, 2, 3, 4];
        let currentAngle = 0;
        let spinning = false;

        function drawWheel() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(cx, cy) - 10;
            const innerRadius = radius - 12;

            ctx.clearRect(0, 0, w, h);

            // Rim
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.lineWidth = 14;
            ctx.strokeStyle = rimColor;
            ctx.stroke();

            if (!numbers.length) {
                return;
            }

            const arc = (Math.PI * 2) / numbers.length;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(currentAngle);

            numbers.forEach((num, i) => {
                const start = -Math.PI / 2 + (i * arc);
                const end = start + arc;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, innerRadius, start, end);
                ctx.closePath();
                ctx.fillStyle = palette[i % palette.length];
                ctx.fill();

                const mid = (start + end) / 2;
                const tx = Math.cos(mid) * innerRadius * 0.63;
                const ty = Math.sin(mid) * innerRadius * 0.63;
                ctx.fillStyle = '#161616';
                ctx.font = `bold ${Math.max(20, Math.floor(200 / numbers.length))}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(num), tx, ty);
            });

            ctx.restore();
        }

        function buildNumberRange(min, max) {
            const result = [];
            for (let i = min; i <= max; i += 1) {
                result.push(i);
            }
            return result;
        }

        function generateWheel() {
            const min = Number.parseInt(minInput.value, 10);
            const max = Number.parseInt(maxInput.value, 10);

            if (Number.isNaN(min) || Number.isNaN(max)) {
                alert('Enter valid whole numbers.');
                return;
            }

            if (max < min) {
                alert('Max must be greater than or equal to min.');
                return;
            }

            const count = max - min + 1;
            if (count > 36) {
                alert('Please keep the range to 36 values or fewer.');
                return;
            }

            numbers = buildNumberRange(min, max);
            currentAngle = 0;
            drawWheel();
        }

        function spinWheel() {
            if (spinning || numbers.length < 2) {
                return;
            }

            spinning = true;
            spinBtn.disabled = true;
            generateBtn.disabled = true;

            const start = performance.now();
            const duration = 3500;
            const extraTurns = (Math.random() * 3) + 5;
            const target = currentAngle + (Math.PI * 2 * extraTurns);

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function frame(now) {
                const elapsed = now - start;
                const progress = Math.min(1, elapsed / duration);
                const eased = easeOutCubic(progress);

                currentAngle = target * eased;
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(frame);
                } else {
                    currentAngle = target % (Math.PI * 2);
                    drawWheel();
                    spinning = false;
                    spinBtn.disabled = false;
                    generateBtn.disabled = false;
                }
            }

            requestAnimationFrame(frame);
        }

        generateBtn.addEventListener('click', generateWheel);
        spinBtn.addEventListener('click', spinWheel);

        drawWheel();
    </script>
</body>
</html>
